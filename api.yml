openapi: 3.0.3
info:
  title: Agro Drone Management API
  version: 1.0.0
servers:
  - url: http://localhost:1323
paths:
  /hello:
    get:
      summary: This is just a test endpoint to get you started.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Test return
          content:
            application/json:    
              schema:
                $ref: "#/components/schemas/HelloResponse"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /estate:
    post:
      summary: Create a new plantation estate
      operationId: CreateEstate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - width
                - length
              properties:
                width:
                  type: integer
                  minimum: 1
                  example: 10
                length:
                  type: integer
                  minimum: 1
                  example: 20
      responses:
        '201':
          description: Estate record committed successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
                    example: "aaaaaa-bbbbb-ccccc-ddddd"

  /estate/{id}/tree:
    post:
      summary: Store a palm tree coordinate node
      operationId: CreateTree # 💡 This forces Go to name the function 'CreateTree'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - x
                - y
                - height
              properties:
                x:
                  type: integer
                  example: 3
                y:
                  type: integer
                  example: 2
                height:
                  type: integer
                  minimum: 1
                  maximum: 30
                  example: 15
      responses:
        '201':
          description: Tree tracking entity logged successfully.

  /estate/{id}/stats:
    get:
      summary: Fetch tree structural statistics
      operationId: GetEstateStats # 💡 This forces Go to name the function 'GetEstateStats'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Height telemetry dataset evaluated completely.
          content:
            application/json:
              schema:
                type: object
                required:
                  - count
                  - max
                  - min
                  - median
                properties:
                  count:
                    type: integer
                  max:
                    type: integer
                  min:
                    type: integer
                  median:
                    type: number

  /estate/{id}/drone-plan:
    get:
      summary: Simulate flight path evaluation plan
      operationId: GetDronePlan # 💡 This forces Go to name the function 'GetDronePlan'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: max_distance
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Drone flight navigation maps generated completely.
          content:
            application/json:
              schema:
                type: object
                required:
                  - distance
                properties:
                  distance:
                    type: integer

components:
  schemas:
    HelloResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Hello, World!"
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    StandardDronePlan:
      type: object
      required:
        - distance
      properties:
        distance:
          type: integer
          example: 54
    BonusDronePlan:
      type: object
      required:
        - distance
        - rest
      properties:
        distance:
          type: integer
          example: 40
        rest:
          type: object
          required:
            - x
            - y
          properties:
            x:
              type: integer
              example: 3
            y:
              type: integer
              example: 1